name: Start fleeting-chat

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Check for existing droplet
        id: check
        run: |
          EXISTING=$(doctl compute droplet list --format Name --no-header | grep -x fleeting-chat || true)
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create droplet
        if: steps.check.outputs.exists == 'false'
        run: |
          doctl compute droplet create fleeting-chat \
            --image docker-20-04 \
            --size s-1vcpu-1gb \
            --region nyc3 \
            --ssh-keys ${{ secrets.DO_SSH_KEY_ID }} \
            --wait

      - name: Get droplet IP
        id: ip
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header | grep fleeting-chat | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be ready
        run: |
          IP=${{ steps.ip.outputs.ip }}
          for i in $(seq 1 36); do
            if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$IP exit 2>/dev/null; then
              echo "SSH is ready."
              exit 0
            fi
            if [ "$i" -eq 36 ]; then
              echo "SSH did not become ready in time."
              exit 1
            fi
            echo "Waiting for SSH… ($i/36)"
            sleep 5
          done

      - name: Deploy
        env:
          IP: ${{ steps.ip.outputs.ip }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@$IP bash -s << 'EOF'
            set -e
            if docker ps -q -f name=fleeting-chat | grep -q .; then
              echo "Container already running, nothing to do."
              exit 0
            fi
            if [ ! -d /app/fleeting-chat ]; then
              git clone https://github.com/${{ github.repository }} /app/fleeting-chat
            else
              git -C /app/fleeting-chat pull
            fi
            cd /app/fleeting-chat
            docker build -t fleeting-chat .
            docker run -d \
              -p 80:3000 \
              -p 3478:3478/udp \
              -p 3478:3478/tcp \
              -p 5349:5349/tcp \
              -e PUBLIC_IP=$IP \
              --name fleeting-chat \
              fleeting-chat
          EOF

      - name: Verify deployment
        env:
          IP: ${{ steps.ip.outputs.ip }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@$IP bash -s << 'EOF'
            echo "=== docker ps ==="
            docker ps -a --filter name=fleeting-chat
            echo ""
            echo "=== docker logs ==="
            docker logs fleeting-chat 2>&1 | tail -30
          EOF

      - name: Print URL
        run: |
          echo "### fleeting-chat is live" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ steps.ip.outputs.ip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the **Stop fleeting-chat** workflow when you're done." >> $GITHUB_STEP_SUMMARY
