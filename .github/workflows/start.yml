name: Start fleeting-chat

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Check for existing droplet
        id: check
        run: |
          EXISTING=$(doctl compute droplet list --format Name --no-header | grep -x fleeting-chat || true)
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create droplet
        if: steps.check.outputs.exists == 'false'
        run: |
          doctl compute droplet create fleeting-chat \
            --image ubuntu-24-04-x64 \
            --size s-1vcpu-1gb \
            --region nyc3 \
            --ssh-keys ${{ secrets.DO_SSH_KEY_ID }} \
            --wait

      - name: Get droplet IP
        id: ip
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header | grep fleeting-chat | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be ready
        run: |
          IP=${{ steps.ip.outputs.ip }}
          for i in $(seq 1 36); do
            if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$IP exit 2>/dev/null; then
              echo "SSH is ready."
              exit 0
            fi
            if [ "$i" -eq 36 ]; then
              echo "SSH did not become ready in time."
              exit 1
            fi
            echo "Waiting for SSH… ($i/36)"
            sleep 5
          done

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            root@${{ steps.ip.outputs.ip }} \
            bash -s "${{ steps.ip.outputs.ip }}" "${{ github.repository }}" << 'ENDSSH'
            set -e
            IP=$1
            REPO=$2
            apt-get install -y -q git
            if [ ! -d /app/fleeting-chat ]; then
              git clone "https://github.com/${REPO}" /app/fleeting-chat
            else
              git -C /app/fleeting-chat pull
            fi
            chmod +x /app/fleeting-chat/scripts/setup.sh
            /app/fleeting-chat/scripts/setup.sh "$IP"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            root@${{ steps.ip.outputs.ip }} bash -s << 'ENDSSH'
            echo "=== coturn ==="
            systemctl is-active coturn || true
            echo ""
            echo "=== fleeting-chat ==="
            systemctl is-active fleeting-chat || true
            echo ""
            echo "=== logs ==="
            journalctl -u fleeting-chat --no-pager -n 20
          ENDSSH

      - name: Print URL
        run: |
          echo "### fleeting-chat is live" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ steps.ip.outputs.ip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Your browser will warn about a self-signed certificate. Proceed past the warning to use the app." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the **Stop fleeting-chat** workflow when you're done." >> $GITHUB_STEP_SUMMARY
